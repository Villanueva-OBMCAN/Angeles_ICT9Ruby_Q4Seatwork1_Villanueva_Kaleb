<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("windowsbg.jpeg");
            background-repeat: no-repeat;
            background-size: cover;
            text-align: center;
            margin-top: 150px;
            color: white;
            font-family: Tahoma,Verdana, sans-serif;
        }
        .box{
            background: rgba(0, 136, 255, 0.444);
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 25px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>LOGIN</h1>
        <br>

        <input type="text" id="username" class="form-control" placeholder="Enter Username"><br>
        <input type="password" id="password" class="form-control" placeholder="Enter Password"><br>

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="stayLogin">
            <label class="form-check-label">Stay logged in</label>
            <p style="font-size:12px;">
                Your session will stay active on this device.
            </p>
        </div>

        <button class="btn btn-primary" onclick="login()">Log in</button>
        <button class="btn btn-secondary" onclick="cancel()">Cancel</button>
        
        <br>
        <br>
 
    <a href="#" onclick="forgotPassword()" style="color:white;">
            Forgot Password?
        </a>
    </div>
    <script>
        var C_Username = "Kaleb";
        var C_Password = "password";

        var attempts = 0;
        var maxAttempts = 3;

        function login(){

            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if(attempts < maxAttempts){

                if(username === C_Username && password === C_Password){
                    alert("Login successful, Welcome " + username + "!");
                    
                } else {
                    attempts++;
                    alert("Login Failed. Attempts Left: " + (maxAttempts - attempts));
                }
            }

            
            if(attempts === maxAttempts){
                alert("Account Locked. Too many failed attempts.");
            }
        }

        
    </script>

</body>
</html>
